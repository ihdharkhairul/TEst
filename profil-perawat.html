<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Perawat — HyperCare</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { colors: { primary:'#F4A300', secondary:'#FFF8E7', hover:'#D88C00' }, fontFamily:{ display:['Sora','sans-serif'], body:['Plus Jakarta Sans','sans-serif'] } } } }</script>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="font-body bg-[#FAF8F2]">
<div class="flex">
  <div data-component="sidebar" data-role="perawat" data-active="profil"></div>
  <div class="flex-1 min-w-0">
    <div data-component="topbar" data-name="Siti Aisyah, S.Kep" data-role="Perawat" data-photo="https://i.pravatar.cc/150?img=47"></div>
    <main class="p-5 md:p-8">
      <div class="card-soft p-6 max-w-2xl">
        <div class="flex items-center gap-4 mb-6">
          <img src="https://i.pravatar.cc/150?img=47" class="w-20 h-20 rounded-full object-cover border-4 border-secondary">
          <div>
            <h2 class="font-display font-bold text-lg">Ns. Siti Aisyah, S.Kep</h2>
            <p class="text-sm text-[#94A3B8]">Spesialis Hipertensi · 5 Tahun Pengalaman</p>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 text-sm">
          <div><p class="text-[#94A3B8] text-xs mb-1">Email</p><p class="font-medium">siti.aisyah@hypercare.id</p></div>
          <div><p class="text-[#94A3B8] text-xs mb-1">Tanggal Lahir</p><p class="font-medium">18 Juli 1995</p></div>
          <div><p class="text-[#94A3B8] text-xs mb-1">Jenis Kelamin</p><p class="font-medium">Perempuan</p></div>
          <div><p class="text-[#94A3B8] text-xs mb-1">Spesialis</p><p class="font-medium">Hipertensi</p></div>
          <div class="sm:col-span-2"><p class="text-[#94A3B8] text-xs mb-1">Alamat</p><p class="font-medium">Jl. Sehat Sejahtera No. 8, Kendari, Sulawesi Tenggara</p></div>
        </div>
        <button class="btn-primary mt-6">Edit Profil</button>
      </div>
    </main>
  </div>
</div>
<script src="assets/js/components.js"></script>
</body>
</html>
