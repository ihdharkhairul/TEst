<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Perawat — HyperCare</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { colors: { primary:'#F4A300', secondary:'#FFF8E7', hover:'#D88C00' }, fontFamily:{ display:['Sora','sans-serif'], body:['Plus Jakarta Sans','sans-serif'] } } } }</script>
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="font-body bg-[#FAF8F2]">
<div class="flex">
  <div data-component="sidebar" data-role="perawat" data-active="dashboard"></div>
  <div class="flex-1 min-w-0">
    <div data-component="topbar" data-name="Siti Aisyah, S.Kep" data-role="Perawat" data-photo="https://i.pravatar.cc/150?img=47"></div>

    <main class="p-5 md:p-8 space-y-6">
      <p class="text-[#64748B] text-sm">Pantau dan berikan layanan terbaik untuk pasien Anda.</p>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
        <div class="card-soft p-5"><p class="text-xs text-[#94A3B8] mb-1">Total Pasien</p><p class="font-display font-bold text-2xl">128</p><p class="text-xs text-[#94A3B8] mt-2">Pasien</p></div>
        <div class="card-soft p-5"><p class="text-xs text-[#94A3B8] mb-1">Pasien Aktif</p><p class="font-display font-bold text-2xl">56</p><p class="text-xs text-[#94A3B8] mt-2">Pasien</p></div>
        <div class="card-soft p-5"><p class="text-xs text-[#94A3B8] mb-1">Konsultasi Hari Ini</p><p class="font-display font-bold text-2xl">18</p><p class="text-xs text-[#94A3B8] mt-2">Konsultasi</p></div>
        <div class="card-soft p-5"><p class="text-xs text-[#94A3B8] mb-1">Pasien Berisiko Tinggi</p><p class="font-display font-bold text-2xl text-[#C53030]">8</p><p class="text-xs text-[#94A3B8] mt-2"><i class="fa-solid fa-triangle-exclamation text-[#C53030]"></i> Perlu Perhatian</p></div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <div class="card-soft p-5">
          <h3 class="font-semibold mb-4">Distribusi Status Risiko</h3>
          <canvas id="chartDonut" height="220"></canvas>
        </div>
        <div class="card-soft p-5 lg:col-span-2">
          <h3 class="font-semibold mb-4">Konsultasi Terbaru</h3>
          <div id="hc-konsul-terbaru" class="space-y-3"></div>
          <a href="chat-perawat.html" class="block text-center btn-outline mt-4 text-sm">Lihat Semua</a>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/components.js"></script>
<script>
new Chart(document.getElementById('chartDonut'), {
  type:'doughnut',
  data:{
    labels:['Normal','Pra Hipertensi','Hipertensi Tingkat 1','Hipertensi Tingkat 2'],
    datasets:[{ data:[60,23,12,5], backgroundColor:['#22A559','#F4A300','#F97316','#E53E3E'], borderWidth:0 }]
  },
  options:{ plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{ size:11 } } } }, cutout:'68%' }
});

const list = [
  { nama:'Budi Santoso', time:'10:30 WIB', status:'Belum dibalas', color:'text-[#C53030]', photo:'https://i.pravatar.cc/150?img=68' },
  { nama:'Dewi Lestari', time:'09:45 WIB', status:'Dibalas', color:'text-[#22A559]', photo:'https://i.pravatar.cc/150?img=32' },
  { nama:'Ahmad Fauzi', time:'09:15 WIB', status:'Belum dibalas', color:'text-[#C53030]', photo:'https://i.pravatar.cc/150?img=15' },
];
const konsulEl = document.getElementById('hc-konsul-terbaru');
list.forEach(k => {
  konsulEl.insertAdjacentHTML('beforeend', `
    <div class="flex items-center justify-between p-3 rounded-xl hover:bg-secondary/60">
      <div class="flex items-center gap-3">
        <img src="${k.photo}" class="w-10 h-10 rounded-full object-cover">
        <div><p class="text-sm font-medium">${k.nama}</p><p class="text-xs text-[#94A3B8]">${k.time}</p></div>
      </div>
      <span class="text-xs font-medium ${k.color}">${k.status}</span>
    </div>`);
});
</script>
</body>
</html>
