<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Pasien — HyperCare</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { colors: { primary:'#F4A300', secondary:'#FFF8E7', hover:'#D88C00' }, fontFamily:{ display:['Sora','sans-serif'], body:['Plus Jakarta Sans','sans-serif'] } } } }</script>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="font-body bg-secondary min-h-screen flex items-center justify-center p-4">
  <div class="card-soft w-full max-w-md p-8">
    <div class="text-center mb-7">
      <a href="index.html" class="inline-flex items-center gap-2 mb-4">
        <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white font-display font-bold text-lg">H</div>
        <span class="font-display font-bold text-lg">HyperCare</span>
      </a>
      <h1 class="font-display font-bold text-xl">Masuk sebagai Pasien</h1>
      <p class="text-sm text-[#64748B] mt-1">Pantau kesehatan Anda setiap hari</p>
    </div>
    <form id="formLogin" class="space-y-4">
      <div>
        <label class="text-sm font-medium block mb-1">Email</label>
        <input type="email" id="email" class="input-soft" placeholder="masukan email Anda" required>
      </div>
      <div>
        <label class="text-sm font-medium block mb-1">Password</label>
        <div class="relative">
          <input type="password" id="password" class="input-soft pr-10" placeholder="masukan password" required>
          <i class="fa-regular fa-eye absolute right-3 top-1/2 -translate-y-1/2 text-[#94A3B8] cursor-pointer" onclick="hcTogglePw(this,'password')"></i>
        </div>
      </div>
      <div class="text-right text-sm"><a href="#" class="text-primary text-hover">Lupa Password?</a></div>
      <button type="submit" class="btn-primary w-full">Masuk</button>
    </form>
    <p class="text-center text-sm text-[#64748B] mt-5">Belum punya akun? <a href="register-pasien.html" class="text-primary font-semibold text-hover">Daftar</a></p>
    <p class="text-center text-xs text-[#94A3B8] mt-4 bg-secondary rounded-lg py-2">Demo: pasien@gmail.com / 123456</p>
  </div>

<script src="assets/js/components.js"></script>
<script>
function hcTogglePw(icon, id){
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
}
document.getElementById('formLogin').addEventListener('submit', function(e){
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value.trim();
  if(email === 'pasien@gmail.com' && pass === '123456'){
    hcToast('Login berhasil! Mengalihkan...', 'success');
    setTimeout(()=> window.location.href = 'dashboard-pasien.html', 1000);
  } else {
    hcToast('Email atau password salah (Demo)', 'error');
  }
});
</script>
</body>
</html>
