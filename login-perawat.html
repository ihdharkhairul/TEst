.btn-outline:active{ transform:scale(0.97); }
.card-soft{ background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(30,41,59,.06); border:1px solid #F1EDE3;

.scrollbar-thin::-webkit-scrollbar{width:6px;height:6px;}
.scrollbar-thin::-webkit-scrollbar-thumb{background:#E7E2D4;border-radius:10px;}
.hc-toast{ position:fixed; top:20px; right:20px; z-index:999; padding:.75rem 1.25rem; border-radius:12px;

function nowStr(){ const d=new Date(); return d.toISOString().slice(0,16).replace('T',' '); }
function destroyCharts(){ Object.values(state.charts).forEach(c=>c && c.destroy()); state.charts={}; }

function toast(msg, type='success'){
  const el = document.createElement('div');
  const colors = { success:'#22A559', error:'#E53E3E', info:'#F4A300' };
  el.className = 'hc-toast';
  el.style.background = colors[type] || colors.success;
  el.innerHTML = `<i class="fa-solid ${type==='error'?'fa-circle-exclamation':'fa-circle-check'}"></i><span>${msg}</span>`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}

function badgeCls(s){
  if (!s) return 'badge-normal';
  if (s.includes('Tingkat 2')) return 'badge-tk2';
  if (s.includes('Tingkat 1')) return 'badge-tk1';
  if (s.includes('Pra')) return 'badge-pra';
  return 'badge-normal';
}
function fmtDate(d){ if(!d) return '-'; const dt=new Date(d); return dt.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}); }

function go(route){ state.route = route; state.sidebarOpen=false; render(); window.scrollTo({top:0}); }

function doLogin(email, password){
  const found = nurses.find(n => n.email === email.trim().toLowerCase() && n.password === password);
  if (found){
    currentNurse = found;
    state.loggedIn = true;
    toast(`Login berhasil! Selamat datang, ${found.nama}.`,'success');
    go('dashboard');
  } else {
    toast('Email atau password salah.','error');
  }
}
function doLogout(){
  state.loggedIn = false;
  currentNurse = null;
  toast('Logout berhasil.','success');
  go('login');
}

    const msgs = chats[pid];
    const last = msgs[msgs.length-1];
    const belum = msgs.filter(m=>m.pengirim==='pasien').length % 3; // demo unread count
    return p ? { pasien_id:p.id, pasien_nama:p.nama, pesan_terakhir:last?.pesan, belum_dibaca: belum } : null;
  }).filter(Boolean);

  const content = `
  <main class="p-5 md:p-8 space-y-6 page-transition">
    <p class="text-[#64748B] text-sm">Selamat datang, <strong>${currentNurse.nama}</strong>. Pantau dan layani pasien Anda.</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
      <div class="card-soft p-5"><p class="text-xs text-[#94A3B8] mb-1">Total Pasien</p><p class="font-display font-bold text-2xl">${totalPasien}</p><p class="text-xs text-[#94A3B8] mt-2">Pasien terdaftar</p></div>
      <div class="card-soft p-5"><p class="text-xs text-[#94A3B8] mb-1">Total Pemeriksaan</p><p class="font-display font-bold text-2xl">${totalPemeriksaan}</p><p class="text-xs text-[#94A3B8] mt-2">Rekaman tekanan darah</p></div>
      <div class="card-soft p-5"><p class="text-xs text-[#94A3B8] mb-1">Konsultasi Aktif</p><p class="font-display font-bold text-2xl">${chatList.length}</p><p class="text-xs text-[#94A3B8] mt-2">Percakapan berjalan</p></div>
      <div class="card-soft p-5"><p class="text-xs text-[#94A3B8] mb-1">Pasien Berisiko Tinggi</p><p class="font-display font-bold text-2xl text-[#C53030]">${tk2}</p><p class="text-xs text-[#94A3B8] mt-2"><i class="fa-solid fa-triangle-exclamation mr-1"></i>Hipertensi Tk.2</p></div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
      <div class="card-soft p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold">Distribusi Status Risiko</h3>
          <a href="#" onclick="go('statistik'); return false;" class="text-xs text-primary hover:underline">Detail</a>
        </div>
        <canvas id="chartDashDonut" height="220"></canvas>
      </div>
      <div class="card-soft p-5 lg:col-span-2">
        <h3 class="font-semibold mb-4">Konsultasi Terbaru</h3>
        <div class="space-y-3">
          ${chatList.map(k=>`
            <div class="flex items-center justify-between p-3 rounded-xl hover:bg-secondary/60">
              <div class="flex items-center gap-3">
                <img src="${patientPhoto(k.pasien_id)}" class="w-10 h-10 rounded-full object-cover" alt="${k.pasien_nama}"/>
                <div><p class="text-sm font-medium">${k.pasien_nama}</p><p class="text-xs text-[#94A3B8] truncate max-w-[200px]">${k.pesan_terakhir||'Belum ada pesan'}</p></div>
              </div>
              ${k.belum_dibaca>0 ? `<span class="bg-primary text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">${k.belum_dibaca}</span>`:''}
            </div>`).join('') || `<p class="text-sm text-[#94A3B8] py-4 text-center">Belum ada konsultasi.</p>`}
        </div>
        <a href="#" onclick="go('chatperawat'); return false;" class="block text-center btn-outline mt-4 text-sm">Lihat Semua Konsultasi</a>
      </div>
    </div>
    <div class="card-soft p-5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold">Aktivitas Terbaru</h3>
        <a href="#" onclick="go('aktivitas'); return false;" class="text-xs text-primary hover:underline">Lihat semua</a>
      </div>
      <div class="grid sm:grid-cols-2 gap-x-6 gap-y-2.5">
        ${aktivitas.slice(0,6).map(a=>`
          <div class="flex items-center gap-2.5 text-sm">
            <span class="w-1.5 h-1.5 rounded-full bg-primary flex-shrink-0"></span>
            <span class="text-[#64748B] truncate"><strong class="text-[#1E293B] font-medium">${a.nama}</strong> ${a.deskripsi}</span>
          </div>`).join('')}
      </div>
    </div>
  </main>`;

  setTimeout(()=>{
    destroyCharts();
    const ctx = document.getElementById('chartDashDonut');
    if (ctx) state.charts.dashDonut = new Chart(ctx, {
      type:'doughnut',
      data:{ labels:['Normal','Pra Hipertensi','Hipertensi Tk.1','Hipertensi Tk.2'],
        datasets:[{ data:[normal,pra,tk1,tk2], backgroundColor:['#22A559','#F4A300','#F97316','#E53E3E'], borderWidth:0 }] },
      options:{ plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{ size:11 } } } }, cutout:'68%' },
    });
  },0);

  return layout('dashboard', content);
}

/* ============================= PAGE: DATA PASIEN ============================= */
let dpSearch = '';
let dpModal = false; // 'add'|'edit'|'detail'|false
let dpSelected = null;
let dpForm = {};

function dpEmptyForm(){ return { nama:'', email:'', no_hp:'', jenis_kelamin:'Laki-laki', umur:'', alamat:'' }; }

function renderDataPasien(){
  const list = patients.filter(p => p.nama.toLowerCase().includes(dpSearch.toLowerCase()) || p.email.toLowerCase().includes(dpSearch.toLowerCase()));

  const rows = list.map(p=>`
    <tr class="border-b border-[#F8F5EC]">
      <td class="py-3"><div class="flex items-center gap-2"><img src="${patientPhoto(p.id)}" class="w-8 h-8 rounded-full object-cover" alt="${p.nama}"/><span class="font-medium">${p.nama}</span></div></td>
      <td>${p.umur ? p.umur+' th' : '-'}</td>
      <td>${p.jenis_kelamin || '-'}</td>
      <td>${p.no_hp || '-'}</td>
      <td><span class="badge-status ${badgeCls(p.status_terakhir)}">${p.status_terakhir || 'Belum ada data'}</span></td>
      <td>
        <div class="flex gap-1.5 py-1 flex-wrap">
          <button onclick="dpOpenDetail(${p.id})" class="text-xs btn-outline px-2 py-1">Detail</button>
          <button onclick="dpOpenEdit(${p.id})" class="text-xs btn-outline px-2 py-1"><i class="fa-solid fa-pen"></i></button>
          <a href="#" onclick="monPasienId=${p.id}; go('monitoring'); return false;" class="text-xs btn-primary px-2 py-1">Monitor</a>
          <button onclick="dpDelete(${p.id})" class="text-xs px-2 py-1 rounded-lg border border-red-200 text-red-500 hover:bg-red-50"><i class="fa-solid fa-trash"></i></button>
        </div>
      </td>
    </tr>`).join('') || `<tr><td colspan="6" class="py-8 text-center text-[#94A3B8]">Tidak ada data pasien.</td></tr>`;

  const modalHtml = dpModal==='add' || dpModal==='edit' ? `
    <div class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onclick="dpCloseModal()">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-semibold">${dpModal==='add' ? 'Tambah Pasien Baru' : 'Edit Data Pasien'}</h3>
            <button onclick="dpCloseModal()" class="text-[#94A3B8] hover:text-[#475569]"><i class="fa-solid fa-xmark text-lg"></i></button>
          </div>
          <form onsubmit="dpSave(event)" class="space-y-4">
            <div><label class="text-sm font-medium block mb-1">Nama Lengkap</label><input id="dpf-nama" class="input-soft" value="${dpForm.nama||''}" required/></div>
            <div class="grid grid-cols-2 gap-3">
              <div><label class="text-sm font-medium block mb-1">Email</label><input id="dpf-email" type="email" class="input-soft" value="${dpForm.email||''}" required/></div>
              <div><label class="text-sm font-medium block mb-1">Nomor HP</label><input id="dpf-hp" class="input-soft" value="${dpForm.no_hp||''}"/></div>
              <div><label class="text-sm font-medium block mb-1">Umur</label><input id="dpf-umur" type="number" class="input-soft" value="${dpForm.umur||''}"/></div>
              <div><label class="text-sm font-medium block mb-1">Jenis Kelamin</label>
                <select id="dpf-jk" class="input-soft"><option ${dpForm.jenis_kelamin==='Laki-laki'?'selected':''}>Laki-laki</option><option ${dpForm.jenis_kelamin==='Perempuan'?'selected':''}>Perempuan</option></select></div>
            </div>
            <div><label class="text-sm font-medium block mb-1">Alamat</label><textarea id="dpf-alamat" class="input-soft" rows="2">${dpForm.alamat||''}</textarea></div>
            <div class="flex gap-2 pt-1">
              <button type="submit" class="btn-primary flex-1">Simpan</button>
              <button type="button" onclick="dpCloseModal()" class="btn-outline px-4">Batal</button>
            </div>
          </form>
        </div>
      </div>
    </div>` : '';

  const detailHtml = dpModal==='detail' && dpSelected ? `
    <div class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onclick="dpCloseModal()">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md" onclick="event.stopPropagation()">
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-semibold">Detail Pasien</h3>
            <button onclick="dpCloseModal()"><i class="fa-solid fa-xmark text-lg text-[#94A3B8]"></i></button>
          </div>
          <div class="flex items-center gap-3 mb-4">
            <img src="${patientPhoto(dpSelected.id)}" class="w-16 h-16 rounded-full object-cover" alt="${dpSelected.nama}"/>
            <div><p class="font-semibold">${dpSelected.nama}</p><p class="text-xs text-[#94A3B8]">${dpSelected.email}</p>
              <span class="badge-status ${badgeCls(dpSelected.status_terakhir)} mt-1">${dpSelected.status_terakhir||'Belum ada data'}</span></div>
          </div>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <div><p class="text-[#94A3B8] text-xs">Umur</p><p class="font-medium">${dpSelected.umur? dpSelected.umur+' tahun':'-'}</p></div>
            <div><p class="text-[#94A3B8] text-xs">Jenis Kelamin</p><p class="font-medium">${dpSelected.jenis_kelamin||'-'}</p></div>
            <div><p class="text-[#94A3B8] text-xs">No. HP</p><p class="font-medium">${dpSelected.no_hp||'-'}</p></div>
            <div><p class="text-[#94A3B8] text-xs">Alamat</p><p class="font-medium">${dpSelected.alamat||'-'}</p></div>
          </div>
          <div class="flex gap-2 mt-4">
            <a href="#" onclick="monPasienId=${dpSelected.id}; dpCloseModal(); go('monitoring'); return false;" class="btn-primary flex-1 text-center text-sm">Monitoring</a>
            <button onclick="dpOpenEdit(${dpSelected.id})" class="btn-outline text-sm px-4">Edit</button>
          </div>
        </div>
      </div>
    </div>` : '';

  const content = `
  <main class="p-5 md:p-8 page-transition">
    <div class="card-soft p-6">
      <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
        <h3 class="font-semibold">Data Pasien <span class="text-[#94A3B8] font-normal text-sm">(${list.length})</span></h3>
        <div class="flex gap-3 flex-wrap">
          <input class="input-soft max-w-xs text-sm" placeholder="Cari nama / email..." value="${dpSearch}" oninput="dpSearch=this.value; render();"/>
          <button onclick="dpOpenAdd()" class="btn-primary text-sm"><i class="fa-solid fa-plus mr-1"></i>Tambah Pasien</button>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-[#94A3B8] border-b border-[#F1EDE3]"><th class="py-2">Nama</th><th>Umur</th><th>Jenis Kelamin</th><th>Nomor HP</th><th>Status Terakhir</th><th>Aksi</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  </main>
  ${modalHtml}${detailHtml}`;

  return layout('datapasien', content);
}
function dpOpenAdd(){ dpForm = dpEmptyForm(); dpSelected=null; dpModal='add'; render(); }
function dpOpenEdit(id){ const p = patients.find(x=>x.id===id); dpSelected=p; dpForm = {...p}; dpModal='edit'; render(); }
function dpOpenDetail(id){ dpSelected = patients.find(x=>x.id===id); dpModal='detail'; render(); }
function dpCloseModal(){ dpModal=false; dpSelected=null; render(); }
function dpSave(e){
  e.preventDefault();
  const data = {
    nama: document.getElementById('dpf-nama').value,
    email: document.getElementById('dpf-email').value,
    no_hp: document.getElementById('dpf-hp').value,
    umur: parseInt(document.getElementById('dpf-umur').value)||'',
    jenis_kelamin: document.getElementById('dpf-jk').value,
    alamat: document.getElementById('dpf-alamat').value,
  };
  if (dpModal==='add'){
    patients.push({ id: nextPatientId++, status_terakhir:'Belum ada data', foto:null, ...data });
    toast('Pasien berhasil ditambahkan.','success');
  } else {
    const idx = patients.findIndex(p=>p.id===dpSelected.id);
    patients[idx] = { ...patients[idx], ...data };
    toast('Data pasien diperbarui.','success');
  }
  dpModal=false; dpSelected=null; render();
}
function dpDelete(id){
  const p = patients.find(x=>x.id===id);
  if (!confirm(`Hapus pasien "${p.nama}"? Semua data terkait akan ikut terhapus.`)) return;
  patients = patients.filter(x=>x.id!==id);
  delete tekanan[id]; delete chats[id];
  toast('Pasien dihapus.','success');
  render();
}

/* ============================= PAGE: MONITORING PASIEN ============================= */
let monPasienId = null;
let monForm = {}; let monEditId = null; let monShowForm = false;
function monEmptyForm(){ return { tanggal:'', sistolik:'', diastolik:'', denyut_nadi:'', berat_badan:'', catatan:'' }; }

function classifyStatus(sis, dia){
  if (sis>=160 || dia>=100) return 'Hipertensi Tingkat 2';
  if (sis>=140 || dia>=90) return 'Hipertensi Tingkat 1';
  if (sis>=130 || dia>=85) return 'Pra Hipertensi';
  return 'Normal';
}

function renderMonitoring(){
  if (!monPasienId){
    const content = `
    <main class="p-5 md:p-8 page-transition">
      <div class="card-soft p-8 text-center">
        <p class="text-[#94A3B8] mb-4">Pilih pasien dari halaman Data Pasien untuk melihat monitoring.</p>
        <button onclick="go('datapasien')" class="btn-primary">Ke Data Pasien</button>
      </div>
    </main>`;
    return layout('monitoring', content);
  }
  const pasien = patients.find(p=>p.id===monPasienId);
  const rows = (tekanan[monPasienId]||[]).slice().sort((a,b)=>a.tanggal<b.tanggal?1:-1);
  const total = rows.length;
  const avgS = total? Math.round(rows.reduce((a,r)=>a+r.sistolik,0)/total) : '—';
  const avgD = total? Math.round(rows.reduce((a,r)=>a+r.diastolik,0)/total) : '—';
  const maxS = total? Math.max(...rows.map(r=>r.sistolik)) : '—';
  const statusTerakhir = total ? rows[0].status : 'Belum ada data';
  const umurLabel = pasien.umur ? pasien.umur+' Tahun' : '';

  const formHtml = monShowForm ? `
  <form onsubmit="monSave(event)" class="card-soft p-5 grid sm:grid-cols-3 gap-4">
    <div><label class="text-sm font-medium block mb-1">Tanggal</label><input id="mf-tanggal" type="date" class="input-soft" value="${monForm.tanggal||''}" required/></div>
    <div><label class="text-sm font-medium block mb-1">Sistolik</label><input id="mf-sis" type="number" class="input-soft" placeholder="120" value="${monForm.sistolik||''}" required/></div>
    <div><label class="text-sm font-medium block mb-1">Diastolik</label><input id="mf-dia" type="number" class="input-soft" placeholder="80" value="${monForm.diastolik||''}" required/></div>
    <div><label class="text-sm font-medium block mb-1">Denyut Nadi</label><input id="mf-nadi" type="number" class="input-soft" placeholder="72" value="${monForm.denyut_nadi||''}"/></div>
    <div><label class="text-sm font-medium block mb-1">Berat Badan (kg)</label><input id="mf-bb" type="number" step="0.1" class="input-soft" placeholder="65" value="${monForm.berat_badan||''}"/></div>
    <div><label class="text-sm font-medium block mb-1">Catatan</label><input id="mf-catatan" class="input-soft" placeholder="Keterangan..." value="${monForm.catatan||''}"/></div>
    <div class="sm:col-span-3 flex gap-2">
      <button type="submit" class="btn-primary">${monEditId ? 'Perbarui':'Simpan Pemeriksaan'}</button>
      ${monEditId ? `<button type="button" onclick="monEditId=null; monForm=monEmptyForm(); render();" class="btn-outline px-4">Batal</button>`:''}
    </div>
  </form>` : '';

  const tableRows = rows.map(d=>`
    <tr class="border-b border-[#F8F5EC]">
      <td class="py-3">${d.tanggal}</td>
      <td>${d.sistolik}/${d.diastolik} mmHg</td>
      <td>${d.denyut_nadi||'-'}</td>
      <td>${d.berat_badan? d.berat_badan+' kg':'-'}</td>
      <td class="max-w-[120px] truncate text-[#64748B]">${d.catatan||'-'}</td>
      <td><span class="badge-status ${badgeCls(d.status)}">${d.status||'Normal'}</span></td>
      <td><div class="flex gap-1 py-1">
        <button onclick="monEdit(${d.id})" class="text-xs btn-outline px-2 py-1"><i class="fa-solid fa-pen"></i></button>
        <button onclick="monDelete(${d.id})" class="text-xs px-2 py-1 rounded-lg border border-red-200 text-red-500 hover:bg-red-50"><i class="fa-solid fa-trash"></i></button>
      </div></td>
    </tr>`).join('') || `<tr><td colspan="7" class="py-8 text-center text-[#94A3B8]">Belum ada data pemeriksaan.</td></tr>`;

  const content = `
  <main class="p-5 md:p-8 space-y-6 page-transition">
    <div class="card-soft p-5 flex items-center gap-4 flex-wrap">
      <img src="${patientPhoto(pasien.id)}" class="w-16 h-16 rounded-full object-cover border-4 border-secondary" alt="${pasien.nama}"/>
      <div class="flex-1">
        <h3 class="font-semibold">${pasien.nama}</h3>
        <p class="text-xs text-[#94A3B8]">${umurLabel} · ${pasien.jenis_kelamin||'-'} · ${pasien.no_hp||'-'}</p>
      </div>
      <div class="flex items-center gap-3">
        <span class="badge-status ${badgeCls(statusTerakhir)}">Status: ${statusTerakhir}</span>
        <button onclick="monShowForm=!monShowForm; monEditId=null; monForm=monEmptyForm(); render();" class="btn-primary text-sm">
          <i class="fa-solid ${monShowForm?'fa-xmark':'fa-plus'} mr-1"></i>${monShowForm?'Tutup':'Tambah Pemeriksaan'}
        </button>
      </div>
    </div>
    ${formHtml}
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
      <div class="card-soft p-5 lg:col-span-2">
        <h3 class="font-semibold mb-4">Grafik Tekanan Darah</h3>
        ${rows.length ? `<canvas id="chartMon" height="140"></canvas>` : `<p class="text-sm text-[#94A3B8] text-center py-8">Belum ada data pemeriksaan.</p>`}
      </div>
      <div class="card-soft p-5">
        <h3 class="font-semibold mb-4">Ringkasan Statistik</h3>
        <div class="space-y-3 text-sm">
          <div class="flex justify-between"><span class="text-[#94A3B8]">Total Pemeriksaan</span><span class="font-semibold">${total}</span></div>
          <div class="flex justify-between"><span class="text-[#94A3B8]">Rata-rata Sistolik</span><span class="font-semibold">${avgS} mmHg</span></div>
          <div class="flex justify-between"><span class="text-[#94A3B8]">Rata-rata Diastolik</span><span class="font-semibold">${avgD} mmHg</span></div>
          <div class="flex justify-between"><span class="text-[#94A3B8]">Tertinggi</span><span class="font-semibold">${maxS} mmHg</span></div>
          <hr class="border-[#F1EDE3]"/>
          <div class="space-y-2">
            ${[['Normal','< 130/85','badge-normal'],['Pra Hipertensi','130-139/85-89','badge-pra'],['Hipertensi Tk.1','140-159/90-99','badge-tk1'],['Hipertensi Tk.2','≥ 160/100','badge-tk2']]
              .map(([l,r,c])=>`<div class="flex items-center justify-between"><span class="badge-status ${c}">${l}</span><span class="text-[#94A3B8] text-xs">${r}</span></div>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="card-soft p-5">
      <h3 class="font-semibold mb-4">Riwayat Pemeriksaan</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-[#94A3B8] border-b border-[#F1EDE3]"><th class="py-2">Tanggal</th><th>Tekanan Darah</th><th>Nadi</th><th>Berat</th><th>Catatan</th><th>Status</th><th>Aksi</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>
  </main>`;

  setTimeout(()=>{
    destroyCharts();
    const ctx = document.getElementById('chartMon');
    if (ctx){
      const rev = rows.slice().reverse().slice(-10);
      state.charts.mon = new Chart(ctx, {
        type:'line',
        data:{ labels: rev.map(d=>d.tanggal),
          datasets:[
            { label:'Sistolik', data:rev.map(d=>d.sistolik), borderColor:'#F4A300', backgroundColor:'#F4A30022', tension:.4, fill:true },
            { label:'Diastolik', data:rev.map(d=>d.diastolik), borderColor:'#94A3B8', backgroundColor:'#94A3B822', tension:.4, fill:true },
          ] },
        options:{ scales:{ y:{ suggestedMin:60, suggestedMax:180 } } },
      });
    }
  },0);

  return layout('monitoring', content);
}
function monEdit(id){
  const row = tekanan[monPasienId].find(r=>r.id===id);
  monEditId = id; monForm = {...row}; monShowForm = true; render();
}
function monDelete(id){
  if (!confirm('Hapus data pemeriksaan ini?')) return;
  tekanan[monPasienId] = tekanan[monPasienId].filter(r=>r.id!==id);
  toast('Dihapus.','success'); render();
}
function monSave(e){
  e.preventDefault();
  const sis = parseInt(document.getElementById('mf-sis').value);
  const dia = parseInt(document.getElementById('mf-dia').value);
  const data = {
    tanggal: document.getElementById('mf-tanggal').value,
    sistolik: sis, diastolik: dia,
    denyut_nadi: parseInt(document.getElementById('mf-nadi').value)||'',
    berat_badan: parseFloat(document.getElementById('mf-bb').value)||'',
    catatan: document.getElementById('mf-catatan').value,
    status: classifyStatus(sis, dia),
  };
  if (!tekanan[monPasienId]) tekanan[monPasienId]=[];
  if (monEditId){
    const idx = tekanan[monPasienId].findIndex(r=>r.id===monEditId);
    tekanan[monPasienId][idx] = { ...tekanan[monPasienId][idx], ...data };
    toast('Data diperbarui.','success');
  } else {
    tekanan[monPasienId].push({ id: nextTekananId++, ...data });
    toast('Pemeriksaan berhasil dicatat.','success');
  }
  const p = patients.find(x=>x.id===monPasienId);
  if (p) p.status_terakhir = data.status;
  monShowForm=false; monEditId=null; monForm=monEmptyForm(); render();
}

    <div class="flex items-center justify-between">
      <p class="text-[#64748B] text-sm">Ringkasan statistik kesehatan seluruh pasien HyperCare.</p>

      <div class="card-soft p-5"><p class="text-xs text-[#94A3B8] mb-1">Berisiko Tinggi</p><p class="font-display font-bold text-2xl text-[#C53030]">${tk2}</p><p class="text-xs text-[#94A3B8] mt-2"><i class="fa-solid fa-triangle-exclamation mr-1"></i>Hipertensi Tingkat 2</p></div>

    </div>

  setTimeout(()=>{

      type:'doughnut',
      data:{ labels:['Normal','Pra Hipertensi','Hipertensi Tk.1','Hipertensi Tk.2'], datasets:[{ data:[normal,pra,tk1,tk2], backgroundColor:['#22A559','#F4A300','#F97316','#E53E3E'], borderWidth:0 }] },

      type:'bar',
      data:{ labels:['Normal','Pra Hipertensi','Hipertensi Tk.1','Hipertensi Tk.2'], datasets:[{ data:[normal,pra,tk1,tk2], backgroundColor:['#22A559','#F4A300','#F97316','#E53E3E'], borderRadius:8, maxBarThickness:50 }] },

/* ============================= PAGE: CHAT PERAWAT ============================= */
let chatSearch = '';
function renderChatPerawat(){
  const chatListRaw = Object.keys(chats).map(pid=>{
    const p = patients.find(x=>x.id==pid);
    const msgs = chats[pid];
    const last = msgs[msgs.length-1];
    const belum = msgs.filter(m=>m.pengirim==='pasien').length % 3;
    return p ? { pasien_id:p.id, pasien_nama:p.nama, pesan_terakhir:last?.pesan, belum_dibaca: belum } : null;
  }).filter(Boolean);
  const filtered = chatListRaw.filter(c=>c.pasien_nama.toLowerCase().includes(chatSearch.toLowerCase()));

  const listHtml = filtered.map(c=>`
    <button onclick="state.activePasienId=${c.pasien_id}; render();" class="w-full flex items-center gap-3 p-3 hover:bg-secondary text-left${state.activePasienId===c.pasien_id ? ' bg-secondary':''}">
      <img src="${patientPhoto(c.pasien_id)}" class="w-11 h-11 rounded-full object-cover" alt="${c.pasien_nama}"/>
      <div class="flex-1 min-w-0"><p class="text-sm font-medium truncate">${c.pasien_nama}</p><p class="text-xs text-[#94A3B8] truncate">${c.pesan_terakhir||'Belum ada pesan'}</p></div>
      ${c.belum_dibaca>0 ? `<span class="bg-primary text-white text-xs rounded-full w-5 h-5 flex items-center justify-center flex-shrink-0">${c.belum_dibaca}</span>`:''}
    </button>`).join('') || `<p class="text-sm text-[#94A3B8] p-4 text-center">Belum ada konsultasi.</p>`;

  const active = patients.find(p=>p.id===state.activePasienId);
  let chatWindow;
  if (active){
    const msgs = chats[active.id] || [];
    chatWindow = `
    <div class="flex-1 flex flex-col min-w-0">
      <div class="flex items-center gap-3 p-4 border-b border-[#F1EDE3]">
        <img src="${patientPhoto(active.id)}" class="w-10 h-10 rounded-full object-cover" alt=""/>
        <div><p class="font-medium text-sm">${active.nama}</p><p class="text-xs text-[#94A3B8]">Pasien</p></div>
      </div>
      <div id="chatBody" class="flex-1 overflow-y-auto scrollbar-thin p-5 space-y-4 bg-[#FFFDF8]">
        ${msgs.length===0 ? `<p class="text-center text-sm text-[#94A3B8] mt-8">Belum ada percakapan.</p>` : msgs.map(m=>`
          <div class="flex ${m.pengirim==='perawat' ? 'justify-end':'justify-start'}">
            <div class="max-w-[75%] ${m.pengirim==='perawat' ? 'chat-bubble-me':'chat-bubble-other'} px-4 py-2 text-sm">
              ${m.pesan}<div class="text-[10px] opacity-70 mt-1 text-right">${m.created_at?.slice(11,16)}</div>
            </div>
          </div>`).join('')}
      </div>
      <form onsubmit="chatSend(event)" class="p-4 border-t border-[#F1EDE3] flex gap-2">
        <input id="chatMsgInput" class="input-soft flex-1" placeholder="Tulis pesan..."/>
        <button type="submit" class="btn-primary px-4"><i class="fa-solid fa-paper-plane"></i></button>
      </form>
    </div>`;
  } else {
    chatWindow = `<div class="flex-1 flex items-center justify-center text-[#94A3B8] text-sm">Pilih pasien untuk membuka percakapan.</div>`;
  }

  const content = `
  <main class="p-5 md:p-8 page-transition">
    <div class="card-soft flex h-[calc(100vh-150px)] overflow-hidden">
      <div class="w-[280px] border-r border-[#F1EDE3] flex-col hidden md:flex">
        <div class="p-4 border-b border-[#F1EDE3]"><input class="input-soft text-sm" placeholder="Cari pasien..." value="${chatSearch}" oninput="chatSearch=this.value; render();"/></div>
        <div class="overflow-y-auto scrollbar-thin flex-1">${listHtml}</div>
      </div>
      ${chatWindow}
    </div>
  </main>`;

  setTimeout(()=>{ const b=document.getElementById('chatBody'); if (b) b.scrollTop=b.scrollHeight; },0);
  return layout('chatperawat', content);
}
function chatSend(e){
  e.preventDefault();
  const input = document.getElementById('chatMsgInput');
  const text = input.value.trim();
  if (!text || !state.activePasienId) return;
  if (!chats[state.activePasienId]) chats[state.activePasienId]=[];
  chats[state.activePasienId].push({ id: Date.now(), pengirim:'perawat', pesan:text, created_at: nowStr() });
  render();
}

let eduSearch=''; let eduModal=false; let eduEditId=null; let eduForm={};
function eduEmptyForm(){ return { judul:'', ringkasan:'', isi:'', thumbnail:'', kategori:KATEGORI_OPTIONS[0], penulis:currentNurse.nama, sumber:TRUSTED_SOURCES[0], waktu_baca:5, url_artikel:'', url_video:'', url_reel:'', is_published:1 }; }

          <div><label class="text-sm font-medium block mb-1">Ringkasan</label><textarea id="ef-ringkasan" class="input-soft" rows="2" placeholder="Ringkasan singkat untuk card...">${eduForm.ringkasan||''}</textarea></div>
          <div><label class="text-sm font-medium block mb-1">URL Thumbnail</label><input id="ef-thumb" class="input-soft" value="${eduForm.thumbnail||''}" placeholder="https://..."/></div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="text-sm font-medium block mb-1">Kategori</label><select id="ef-kategori" class="input-soft">${KATEGORI_OPTIONS.map(k=>`<option ${eduForm.kategori===k?'selected':''}>${k}</option>`).join('')}</select></div>
            <div><label class="text-sm font-medium block mb-1">Waktu Baca (menit)</label><input id="ef-waktu" type="number" min="1" max="60" class="input-soft" value="${eduForm.waktu_baca||5}"/></div>
            <div><label class="text-sm font-medium block mb-1">Penulis</label><input id="ef-penulis" class="input-soft" value="${eduForm.penulis||currentNurse.nama}" required/></div>
            <div><label class="text-sm font-medium block mb-1">Sumber Terpercaya</label><select id="ef-sumber" class="input-soft">${TRUSTED_SOURCES.map(s=>`<option ${eduForm.sumber===s?'selected':''}>${s}</option>`).join('')}</select></div>
          </div>
          <div class="flex items-center gap-2">
            <input id="ef-publish" type="checkbox" ${eduForm.is_published?'checked':''} class="w-4 h-4 accent-primary"/>

          <div class="flex gap-2 pt-1">

            <button type="button" onclick="eduCloseModal()" class="btn-outline px-4">Batal</button>
          </div>
        </form>
      </div>
    </div>
  </div>` : '';

  const content = `
  <main class="p-5 md:p-8 page-transition">
    <div class="mb-6">
      <h1 class="font-display font-bold text-xl md:text-2xl">Kelola Edukasi</h1>
      <p class="text-[#64748B] text-sm mt-1">Konten yang kamu terbitkan di sini akan langsung muncul di halaman Edukasi dan Dashboard pasien.</p>
    </div>
    <div class="card-soft p-6">
      <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
        <h2 class="font-display font-bold text-lg">Daftar Konten <span class="text-[#94A3B8] font-normal text-sm">(${edukasi.length})</span></h2>

          <button onclick="eduOpenAdd()" class="btn-primary text-sm"><i class="fa-solid fa-plus mr-1"></i>Tambah Konten</button>

      </div>
      <div class="overflow-x-auto">

function eduOpenAdd(){ eduForm=eduEmptyForm(); eduEditId=null; eduModal=true; render(); }
function eduOpenEdit(id){ const e=edukasi.find(x=>x.id===id); eduEditId=id; eduForm={...e}; eduModal=true; render(); }
function eduCloseModal(){ eduModal=false; eduEditId=null; render(); }
function eduSave(e){
  e.preventDefault();
  const data = {
    judul: document.getElementById('ef-judul').value,
    ringkasan: document.getElementById('ef-ringkasan').value,
    thumbnail: document.getElementById('ef-thumb').value,
    kategori: document.getElementById('ef-kategori').value,
    waktu_baca: parseInt(document.getElementById('ef-waktu').value)||5,
    penulis: document.getElementById('ef-penulis').value,
    sumber: document.getElementById('ef-sumber').value,
    is_published: document.getElementById('ef-publish').checked ? 1 : 0,
  };
  if (eduEditId){
    const idx = edukasi.findIndex(x=>x.id===eduEditId);
    edukasi[idx] = { ...edukasi[idx], ...data };
    toast('Konten diperbarui.','success');
  } else {
    edukasi.push({ id: nextEdukasiId++, ...data });
    toast('Konten edukasi dikirim & tampil ke pasien.','success');
  }
  eduModal=false; eduEditId=null; render();
}
function eduDelete(id){
  const e = edukasi.find(x=>x.id===id);
  if (!confirm(`Hapus konten "${e.judul}"?`)) return;
  edukasi = edukasi.filter(x=>x.id!==id);
  toast('Konten dihapus.','success'); render();
}
function eduToggle(id){ const e=edukasi.find(x=>x.id===id); e.is_published = e.is_published?0:1; render(); }

    <div class="card-soft p-6"><h3 class="font-semibold mb-4">Aktivitas Terbaru</h3><div>${rows}</div></div>
  </main>`;
  return layout('aktivitas', content);
}

/* ============================= PAGE: RIWAYAT LOGIN ============================= */
function renderRiwayatLogin(){
  const rows = riwayatLogin.map(r=>`
    <tr class="border-b border-[#F8F5EC]"><td class="py-3">${r.waktu}</td><td>${r.device}</td><td>${r.ip}</td></tr>`).join('');
  const content = `
  <main class="p-5 md:p-8 page-transition">
    <div class="card-soft p-6">
      <h3 class="font-semibold mb-4">Riwayat Login</h3>
      <div class="overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="text-left text-[#94A3B8] border-b border-[#F1EDE3]"><th class="py-2">Waktu</th><th>Perangkat</th><th>IP Address</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  </main>`;
  return layout('riwayat-login', content);
}

/* ============================= MAIN RENDER ============================= */
function render(){
  const app = document.getElementById('app');
  if (!state.loggedIn){ app.innerHTML = renderLogin(); return; }
  let html;
  switch(state.route){
    case 'datapasien': html = renderDataPasien(); break;
    case 'monitoring': html = renderMonitoring(); break;
    case 'statistik': html = renderStatistik(); break;
    case 'chatperawat': html = renderChatPerawat(); break;
    case 'edukasi': html = renderEdukasi(); break;
    case 'profil': html = renderProfil(); break;
    case 'notifikasi': html = renderNotifikasi(); break;
    case 'aktivitas': html = renderAktivitas(); break;
    case 'riwayat-login': html = renderRiwayatLogin(); break;
    default: html = renderDashboard();
  }
  app.innerHTML = html;
}

render();
</script>
</body>
</html>
