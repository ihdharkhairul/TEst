<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat Pemeriksaan — HyperCare</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { colors: { primary:'#F4A300', secondary:'#FFF8E7', hover:'#D88C00' }, fontFamily:{ display:['Sora','sans-serif'], body:['Plus Jakarta Sans','sans-serif'] } } } }</script>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="font-body bg-[#FAF8F2]">
<div class="flex">
  <div data-component="sidebar" data-role="pasien" data-active="riwayat"></div>
  <div class="flex-1 min-w-0">
    <div data-component="topbar" data-name="Budi Santoso" data-role="Pasien" data-photo="https://i.pravatar.cc/150?img=68"></div>
    <main class="p-5 md:p-8">
      <div class="card-soft p-6">
        <div class="flex items-center justify-between mb-5">
          <h3 class="font-semibold">Riwayat Pemeriksaan</h3>
          <span class="text-xs text-[#94A3B8]">Total 24 pemeriksaan</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="text-left text-[#94A3B8] border-b border-[#F1EDE3]">
              <th class="py-2">Tanggal</th><th>Tekanan Darah</th><th>Status</th>
            </tr></thead>
            <tbody id="hc-riwayat-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="assets/js/data.js"></script>
<script src="assets/js/components.js"></script>
<script>
const body = document.getElementById('hc-riwayat-body');
HC_RIWAYAT.forEach(d => {
  body.insertAdjacentHTML('beforeend', `
    <tr class="border-b border-[#F8F5EC]">
      <td class="py-3">${d.tgl}</td>
      <td>${d.sistol}/${d.diastol} mmHg</td>
      <td><span class="badge-status ${d.badge}">${d.status}</span></td>
    </tr>`);
});
</script>
</body>
</html>
